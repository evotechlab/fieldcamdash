<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Admin - Archivio Cantieri</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .skeleton {
            background: linear-gradient(90deg, #e2e8f0 25%, #cbd5e1 50%, #e2e8f0 75%);
            background-size: 200% 100%;
            animation: loading 1.5s infinite;
        }
        @keyframes loading {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
    </style>
</head>
<body class="bg-slate-50 text-gray-800 font-sans min-h-screen flex flex-col">

    <div id="login-screen" class="fixed inset-0 bg-slate-900 flex items-center justify-center z-50 hidden">
        <div class="bg-white p-8 rounded-2xl shadow-2xl max-w-sm w-full text-center">
            <div class="bg-blue-50 w-24 h-24 rounded-full flex items-center justify-center mx-auto mb-6">
                <i class="fab fa-dropbox text-5xl text-blue-600"></i>
            </div>
            <h2 class="text-2xl font-bold text-gray-800 mb-2">Accesso Admin</h2>
            <p class="text-sm text-gray-500 mb-8">Connetti il tuo account per accedere all'archivio dei cantieri.</p>
            <button onclick="avviaLoginDropbox()" class="w-full bg-blue-600 text-white font-bold p-4 rounded-xl hover:bg-blue-700 transition shadow-lg flex justify-center items-center">
                <i class="fas fa-shield-alt mr-2"></i> Accesso Sicuro
            </button>
        </div>
    </div>

    <div id="app-container" class="hidden flex-1 flex flex-col">
        <header class="bg-white border-b border-gray-200 sticky top-0 z-40">
            <div class="container mx-auto px-4 py-4 flex justify-between items-center">
                <div class="flex items-center">
                    <div class="bg-blue-600 text-white p-2 rounded-lg mr-3">
                        <i class="fas fa-solar-panel text-xl"></i>
                    </div>
                    <h1 class="text-xl font-bold text-gray-800">FieldCam Dashboard</h1>
                </div>
                <div class="flex items-center space-x-4">
                    <span id="status" class="text-sm bg-green-50 text-green-700 border border-green-200 px-3 py-1.5 rounded-full font-medium flex items-center">
                        <i class="fas fa-circle text-[10px] mr-2 text-green-500"></i> Online
                    </span>
                    <button onclick="logout()" class="text-gray-500 hover:text-red-600 transition p-2 rounded-lg hover:bg-red-50">
                        <i class="fas fa-sign-out-alt text-lg"></i>
                    </button>
                </div>
            </div>
        </header>

        <main class="container mx-auto px-4 py-8 flex-1">
            <div class="bg-white rounded-xl p-4 shadow-sm border border-gray-100 flex items-center space-x-2 text-sm text-gray-600 mb-6" id="breadcrumbs"></div>

            <div id="metadata-panel" class="hidden bg-gradient-to-r from-blue-700 to-indigo-800 rounded-2xl p-6 shadow-lg mb-8 text-white relative overflow-hidden">
                <i class="fas fa-chart-line absolute -right-10 -bottom-10 text-9xl text-white opacity-10"></i>
                <div class="flex items-center justify-between border-b border-blue-400/30 pb-4 mb-4 relative z-10">
                    <h2 class="text-2xl font-bold flex items-center"><i class="fas fa-clipboard-check text-green-400 mr-3"></i> Dashboard Cantiere</h2>
                    <span class="bg-blue-900/50 px-3 py-1 rounded-full text-xs font-semibold uppercase tracking-wider border border-blue-400/30">Dati Rilevati</span>
                </div>
                <div id="metadata-grid" class="grid grid-cols-2 md:grid-cols-4 gap-4 relative z-10">
                    </div>
            </div>

            <div id="loading" class="text-center py-20 hidden">
                <i class="fas fa-circle-notch fa-spin text-5xl text-blue-500 mb-4"></i>
                <p class="text-gray-500 font-medium">Lettura directory...</p>
            </div>

            <div id="folders-section" class="mb-10 hidden">
                <h3 class="text-lg font-bold text-gray-800 mb-4 flex items-center border-b pb-2"><i class="fas fa-folder-tree text-blue-500 mr-2"></i> Categorie / Aree</h3>
                <div id="folders-grid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4"></div>
            </div>

            <div id="photos-section" class="hidden">
                <h3 class="text-lg font-bold text-gray-800 mb-4 flex items-center border-b pb-2"><i class="fas fa-images text-blue-500 mr-2"></i> Fotografie in questa cartella</h3>
                <div id="photos-grid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-6"></div>
            </div>
            
            <div id="empty-state" class="hidden text-center py-20">
                <div class="bg-gray-100 w-24 h-24 rounded-full flex items-center justify-center mx-auto mb-4">
                    <i class="fas fa-folder-open text-4xl text-gray-400"></i>
                </div>
                <h3 class="text-lg font-bold text-gray-700">Nessun Elemento</h3>
                <p class="text-gray-500">Non ci sono file in questa directory.</p>
            </div>
        </main>
    </div>

    <script>
        const WORKER_URL = "https://dfd89ks.sviluppo-49a.workers.dev"; 
        const ROOT_PATH = ""; 
        let accessToken = localStorage.getItem("db_admin_access");
        
        // Variabile globale per sommare i file del cantiere
        let currentSiteTotalPhotos = 0;

        async function apiCall(action, payload = {}) {
            const res = await fetch(WORKER_URL, {
                method: "POST",
                headers: { 
                    "Content-Type": "application/json",
                    ...(accessToken ? { "Authorization": `Bearer ${accessToken}` } : {})
                },
                body: JSON.stringify({ action, ...payload })
            });

            if (res.status === 401) {
                logout();
                throw new Error("Sessione scaduta");
            }
            if (!res.ok) throw new Error(await res.text());
            return res.json();
        }

        document.addEventListener('DOMContentLoaded', () => {
            if (window.location.hash.includes('access_token')) {
                const hashParams = new URLSearchParams(window.location.hash.substring(1));
                const token = hashParams.get('access_token');
                if (token) {
                    localStorage.setItem("db_admin_access", token);
                    accessToken = token;
                    window.history.replaceState(null, null, window.location.pathname);
                }
            }
            if (accessToken) inizializzaDashboard();
            else document.getElementById('login-screen').classList.remove('hidden');
        });

        async function avviaLoginDropbox() {
            try {
                const data = await apiCall("getAuthUrl");
                if (data.success) window.location.href = data.url;
            } catch (error) {
                alert("Errore proxy di sicurezza.");
            }
        }

        function logout() {
            localStorage.removeItem("db_admin_access");
            window.location.reload();
        }

        async function inizializzaDashboard() {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('app-container').classList.remove('hidden');
            try {
                await apiCall("getCurrentAccount");
                loadFolder(ROOT_PATH);
            } catch (error) {
                if(error.message !== "Sessione scaduta") alert("Errore di connessione a Dropbox.");
            }
        }

        async function loadFolder(path) {
            const loading = document.getElementById('loading');
            const foldersGrid = document.getElementById('folders-grid');
            const photosGrid = document.getElementById('photos-grid');
            const foldersSec = document.getElementById('folders-section');
            const photosSec = document.getElementById('photos-section');
            const emptyState = document.getElementById('empty-state');
            const metadataPanel = document.getElementById('metadata-panel');
            
            foldersGrid.innerHTML = '';
            photosGrid.innerHTML = '';
            foldersSec.classList.add('hidden');
            photosSec.classList.add('hidden');
            emptyState.classList.add('hidden');
            metadataPanel.classList.add('hidden');
            loading.classList.remove('hidden');
            
            currentSiteTotalPhotos = 0; // Resetta il counter globale del cantiere
            renderBreadcrumbs(path);

            try {
                const data = await apiCall("listFolder", { path: path });
                const entries = data.entries || [];

                const folders = entries.filter(e => e['.tag'] === 'folder');
                const files = entries.filter(e => e['.tag'] === 'file');
                
                const photos = files.filter(f => /\.(jpe?g|png|webp|gif)$/i.test(f.name));
                const jsonFiles = files.filter(f => f.name.endsWith('.json'));

                loading.classList.add('hidden');

                if (entries.length === 0) {
                    emptyState.classList.remove('hidden');
                    return;
                }

                // Inizia il conteggio globale con le foto presenti nella radice (se ci sono)
                currentSiteTotalPhotos += photos.length;

                // 1. GESTIONE DASHBOARD CANTIERE (se trova il JSON nella root del cantiere)
                if (jsonFiles.length > 0) {
                    loadMetadataCard(jsonFiles[0].path_display);
                }

                // 2. RENDER SOTTOCARTELLE E CALCOLO NUMERO FOTO
                if (folders.length > 0) {
                    foldersSec.classList.remove('hidden');
                    
                    let folderPromises = folders.map(folder => {
                        const safeId = "fcount-" + folder.id.replace(/[^a-zA-Z0-9]/g, '');
                        const card = document.createElement('div');
                        card.className = "bg-white border border-gray-200 rounded-xl p-4 cursor-pointer hover:border-blue-500 hover:shadow-md transition-all flex items-center justify-between group";
                        card.onclick = () => loadFolder(folder.path_display);
                        card.innerHTML = `
                            <div class="flex items-center overflow-hidden">
                                <div class="bg-blue-50 text-blue-600 w-10 h-10 rounded-lg flex items-center justify-center mr-3 flex-shrink-0 group-hover:scale-110 transition-transform">
                                    <i class="fas fa-folder text-xl"></i>
                                </div>
                                <span class="font-semibold text-gray-700 truncate" title="${folder.name}">${folder.name}</span>
                            </div>
                            <span id="${safeId}" class="text-xs font-bold text-gray-500 bg-gray-100 px-2 py-1 rounded-md ml-2 border border-gray-200"><i class="fas fa-spinner fa-spin"></i></span>
                        `;
                        foldersGrid.appendChild(card);

                        return fetchFolderCount(folder.path_display, safeId);
                    });

                    // Spegne il "loader" del totale foto nel pannello cantiere quando tutte le sottocartelle sono state ispezionate
                    Promise.all(folderPromises).then(() => {
                        const spinner = document.getElementById('meta-spinner');
                        if(spinner) spinner.style.display = 'none';
                    });
                }

                // 3. RENDER FOTO (Lazy Load Anteprime)
                if (photos.length > 0) {
                    photosSec.classList.remove('hidden');
                    photos.forEach(photo => {
                        const safeId = "img-" + photo.id.replace(/[^a-zA-Z0-9]/g, '');
                        const card = document.createElement('div');
                        card.className = "bg-white border border-gray-100 rounded-xl overflow-hidden shadow-sm hover:shadow-xl transition-all duration-300 group flex flex-col";
                        
                        card.innerHTML = `
                            <div class="h-40 relative overflow-hidden bg-gray-100 flex items-center justify-center skeleton" id="container-${safeId}">
                                <img id="${safeId}" src="" class="w-full h-full object-cover hidden transition-transform duration-700 group-hover:scale-110" alt="${photo.name}">
                                <div class="absolute inset-0 bg-gray-900/40 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity duration-300">
                                    <button onclick="downloadFile('${photo.path_display}', '${photo.name}')" class="bg-white text-gray-900 font-bold py-2 px-4 rounded-full shadow-lg hover:bg-blue-50 transform translate-y-4 group-hover:translate-y-0 transition-all">
                                        <i class="fas fa-download mr-1"></i>
                                    </button>
                                </div>
                            </div>
                            <div class="p-3 bg-white border-t border-gray-50 flex flex-col">
                                <p class="text-xs font-medium text-gray-600 truncate" title="${photo.name}">${photo.name}</p>
                            </div>
                        `;
                        photosGrid.appendChild(card);
                        fetchImagePreview(photo.path_display, safeId);
                    });
                }

            } catch (error) {
                loading.classList.add('hidden');
                console.error(error);
                alert("Errore nel caricamento della directory.");
            }
        }

        async function loadMetadataCard(jsonPath) {
            try {
                const linkData = await apiCall("getTemporaryLink", { path: jsonPath });
                const response = await fetch(linkData.link);
                const meta = await response.json();

                const panel = document.getElementById('metadata-panel');
                const grid = document.getElementById('metadata-grid');
                grid.innerHTML = ''; 
                
                const items = [
                    { icon: 'fa-hard-hat text-yellow-400', label: 'Operatore', value: meta.operatore || meta.operator || 'N/D' },
                    { icon: 'fa-map-marker-alt text-red-400', label: 'Cantiere', value: meta.cantiere || meta.site || 'N/D' },
                    { icon: 'fa-bolt text-yellow-300', label: 'Potenza / Note', value: meta.potenza || meta.power || '-' },
                    { icon: 'fa-camera text-blue-300', label: 'Archivio Totale', value: `<span id="meta-total-photos">${currentSiteTotalPhotos}</span> <i class="fas fa-circle-notch fa-spin text-[10px] ml-1 opacity-70" id="meta-spinner"></i>` }
                ];

                items.forEach(item => {
                    grid.innerHTML += `
                        <div class="bg-black/20 p-4 rounded-xl border border-white/10 backdrop-blur-md">
                            <p class="text-blue-200 text-xs font-semibold uppercase mb-1 flex items-center tracking-wider">
                                <i class="fas ${item.icon} w-5"></i> ${item.label}
                            </p>
                            <p class="text-xl font-bold truncate tracking-tight" title="${item.value.toString().replace(/<[^>]*>?/gm, '')}">${item.value}</p>
                        </div>
                    `;
                });

                panel.classList.remove('hidden');
            } catch (error) {
                console.warn("Impossibile generare la dashboard dal file JSON.");
            }
        }

        async function fetchFolderCount(folderPath, elementId) {
            try {
                const data = await apiCall("listFolder", { path: folderPath });
                const count = data.entries.filter(e => e['.tag'] === 'file' && /\.(jpe?g|png|webp|gif)$/i.test(e.name)).length;
                
                const badge = document.getElementById(elementId);
                if(badge) badge.innerHTML = `${count} file`;

                // Aggiorna in tempo reale il numero totale nella dashboard madre!
                currentSiteTotalPhotos += count;
                const totalSpan = document.getElementById('meta-total-photos');
                if (totalSpan) totalSpan.innerText = currentSiteTotalPhotos + " Foto";

            } catch (e) {
                const badge = document.getElementById(elementId);
                if(badge) badge.innerHTML = "?";
            }
        }

        async function fetchImagePreview(filePath, imgId) {
            try {
                const data = await apiCall("getTemporaryLink", { path: filePath });
                const imgEl = document.getElementById(imgId);
                const containerEl = document.getElementById('container-' + imgId);
                
                if (imgEl && containerEl) {
                    imgEl.src = data.link;
                    imgEl.onload = () => {
                        imgEl.classList.remove('hidden');
                        containerEl.classList.remove('skeleton');
                    };
                }
            } catch (error) {
                const containerEl = document.getElementById('container-' + imgId);
                if (containerEl) {
                    containerEl.classList.remove('skeleton');
                    containerEl.innerHTML = '<i class="fas fa-image-slash text-gray-300 text-3xl"></i>';
                }
            }
        }

        async function downloadFile(path, filename) {
            try {
                const data = await apiCall("getTemporaryLink", { path: path });
                const a = document.createElement('a');
                a.href = data.link;
                a.download = filename;
                a.target = '_blank';
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
            } catch (error) {
                alert("Errore durante la generazione del link di download.");
            }
        }

        function renderBreadcrumbs(path) {
            const breadcrumbs = document.getElementById('breadcrumbs');
            
            if (path === "" || path === "/") {
                breadcrumbs.innerHTML = `<button class="font-bold text-blue-700 hover:text-blue-800 flex items-center"><i class="fas fa-home mr-2 text-lg"></i> Archivio Principale</button>`;
                return;
            }

            const parts = path.split('/').filter(p => p !== '');
            let html = `<button onclick="loadFolder('${ROOT_PATH}')" class="text-gray-500 hover:text-blue-600 transition flex items-center"><i class="fas fa-home mr-1"></i> Home</button>`;
            
            let currentBuildPath = "";
            parts.forEach((part, index) => {
                currentBuildPath += '/' + part;
                html += ` <i class="fas fa-chevron-right text-[10px] text-gray-400 mx-2"></i> `;
                if (index === parts.length - 1) {
                    html += `<span class="font-bold text-blue-700 bg-blue-50 px-2 py-0.5 rounded">${part}</span>`;
                } else {
                    html += `<button onclick="loadFolder('${currentBuildPath}')" class="text-gray-600 hover:text-blue-600 transition">${part}</button>`;
                }
            });
            breadcrumbs.innerHTML = html;
        }
    </script>
</body>
</html>

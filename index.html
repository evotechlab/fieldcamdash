<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Operatore - Archivio Foto</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dropbox.js/10.33.0/Dropbox-sdk.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-100 text-gray-800 font-sans">

    <div id="login-screen" class="fixed inset-0 bg-gray-900 flex items-center justify-center z-50">
        <div class="bg-white p-8 rounded-lg shadow-xl max-w-sm w-full text-center">
            <div class="mb-6">
                <i class="fas fa-lock text-5xl text-blue-500 mb-4"></i>
                <h2 class="text-2xl font-bold text-gray-800">Accesso Riservato</h2>
                <p class="text-sm text-gray-500 mt-2">Inserisci la password per accedere all'archivio</p>
            </div>
            
            <input type="password" id="password-input" class="w-full border border-gray-300 p-3 rounded mb-4 focus:outline-none focus:border-blue-500" placeholder="Password..." onkeypress="handleEnter(event)">
            
            <button onclick="attemptLogin()" class="w-full bg-blue-600 text-white font-bold p-3 rounded hover:bg-blue-700 transition duration-200">
                Entra
            </button>
            
            <p id="login-error" class="text-red-500 text-sm mt-3 hidden"><i class="fas fa-exclamation-circle"></i> Password errata!</p>
        </div>
    </div>

    <div id="app-container" class="hidden">
        <header class="bg-blue-600 text-white p-4 shadow-md">
            <div class="container mx-auto flex justify-between items-center">
                <h1 class="text-2xl font-bold"><i class="fas fa-camera-retro mr-2"></i> Dashboard Foto</h1>
                <div class="flex items-center space-x-4">
                    <span id="status" class="text-sm bg-blue-800 px-3 py-1 rounded-full"><i class="fas fa-sync fa-spin"></i> Connessione...</span>
                    <button onclick="logout()" class="text-sm hover:underline text-blue-200"><i class="fas fa-sign-out-alt"></i> Esci</button>
                </div>
            </div>
        </header>

        <main class="container mx-auto mt-8 p-4 bg-white rounded-lg shadow min-h-[60vh]">
            
            <div class="flex items-center space-x-2 text-blue-600 mb-6 pb-4 border-b border-gray-200" id="breadcrumbs">
                </div>

            <div id="loading" class="text-center py-10 hidden">
                <i class="fas fa-spinner fa-spin text-4xl text-blue-500"></i>
                <p class="mt-2 text-gray-500">Lettura cartella in corso...</p>
            </div>

            <div id="content-grid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
                </div>

            <div id="metadata-section" class="mt-12 hidden">
                <h3 class="text-lg font-bold border-b pb-2 mb-4 text-gray-600"><i class="fas fa-database mr-2"></i>Metadati in questa cartella</h3>
                <ul id="metadata-list" class="space-y-2">
                    </ul>
            </div>
        </main>
    </div>

    <script>
        // ==========================================
        // IMPOSTAZIONI DI CONFIGURAZIONE
        // ==========================================
        const DASHBOARD_PASSWORD = 'password123'; // CAMBIA QUESTA PASSWORD!
        const DROPBOX_ACCESS_TOKEN = '0kimqzc29he9w1u'; // IL TUO TOKEN DROPBOX
        
        let dbx;
        let currentPath = '';

        // --- SISTEMA DI LOGIN ---

        // Controlla se l'utente è già loggato in questa sessione
        document.addEventListener('DOMContentLoaded', () => {
            if (sessionStorage.getItem('dashboard_logged_in') === 'true') {
                inizializzaDashboard();
            } else {
                document.getElementById('password-input').focus();
            }
        });

        // Permette di premere "Invio" per loggarsi
        function handleEnter(event) {
            if (event.key === 'Enter') {
                attemptLogin();
            }
        }

        function attemptLogin() {
            const inputElement = document.getElementById('password-input');
            const errorElement = document.getElementById('login-error');
            
            if (inputElement.value === DASHBOARD_PASSWORD) {
                sessionStorage.setItem('dashboard_logged_in', 'true');
                errorElement.classList.add('hidden');
                inizializzaDashboard();
            } else {
                errorElement.classList.remove('hidden');
                inputElement.value = '';
                inputElement.focus();
            }
        }

        function logout() {
            sessionStorage.removeItem('dashboard_logged_in');
            window.location.reload(); // Ricarica la pagina tornando al login
        }

        // --- FUNZIONI DELLA DASHBOARD DROPBOX ---

        function inizializzaDashboard() {
            // Nascondi login, mostra app
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('app-container').classList.remove('hidden');
            
            // Inizializza Dropbox
            dbx = new Dropbox.Dropbox({ accessToken: DROPBOX_ACCESS_TOKEN });
            
            testConnection();
            loadFolder('');
        }

        async function testConnection() {
            try {
                await dbx.usersGetCurrentAccount();
                document.getElementById('status').innerHTML = '<i class="fas fa-check-circle text-green-400"></i> Connesso';
            } catch (error) {
                document.getElementById('status').innerHTML = '<i class="fas fa-exclamation-triangle text-red-400"></i> Errore di connessione';
                console.error("Errore di connessione Dropbox:", error);
            }
        }

        async function loadFolder(path) {
            currentPath = path;
            const grid = document.getElementById('content-grid');
            const loading = document.getElementById('loading');
            const metaSection = document.getElementById('metadata-section');
            const metaList = document.getElementById('metadata-list');
            
            grid.innerHTML = '';
            metaList.innerHTML = '';
            metaSection.classList.add('hidden');
            loading.classList.remove('hidden');
            renderBreadcrumbs(path);

            try {
                const response = await dbx.filesListFolder({ path: path });
                const entries = response.result.entries;

                const folders = entries.filter(e => e['.tag'] === 'folder');
                const files = entries.filter(e => e['.tag'] === 'file');
                const photos = files.filter(f => /\.(jpe?g|png|gif|webp)$/i.test(f.name));
                const metadata = files.filter(f => /\.(json|txt|xml|csv)$/i.test(f.name));

                loading.classList.add('hidden');

                // Renderizza Cartelle
                folders.forEach(folder => {
                    const card = document.createElement('div');
                    card.className = "bg-gray-50 hover:bg-blue-50 border border-gray-200 rounded-lg p-4 cursor-pointer transition duration-150 ease-in-out flex items-center shadow-sm hover:shadow-md";
                    card.onclick = () => loadFolder(folder.path_display);
                    card.innerHTML = `
                        <i class="fas fa-folder text-yellow-400 text-3xl mr-4"></i>
                        <span class="font-medium truncate text-gray-700" title="${folder.name}">${folder.name}</span>
                    `;
                    grid.appendChild(card);
                });

                // Renderizza Foto
                photos.forEach(photo => {
                    const card = document.createElement('div');
                    card.className = "bg-white border border-gray-200 rounded-lg overflow-hidden shadow-sm flex flex-col hover:shadow-md transition duration-150";
                    card.innerHTML = `
                        <div class="bg-gray-200 h-40 flex items-center justify-center text-gray-400 border-b border-gray-100">
                            <i class="fas fa-image text-5xl"></i>
                        </div>
                        <div class="p-4 flex-1 flex flex-col justify-between">
                            <p class="text-sm font-medium text-gray-700 truncate mb-3" title="${photo.name}">${photo.name}</p>
                            <button onclick="downloadFile('${photo.path_display}', '${photo.name}')" class="w-full bg-blue-600 hover:bg-blue-700 text-white text-sm py-2 rounded transition shadow-sm">
                                <i class="fas fa-download mr-1"></i> Scarica
                            </button>
                        </div>
                    `;
                    grid.appendChild(card);
                });

                // Renderizza Metadati
                if (metadata.length > 0) {
                    metaSection.classList.remove('hidden');
                    metadata.forEach(meta => {
                        const li = document.createElement('li');
                        li.className = "flex items-center justify-between bg-gray-50 p-3 rounded border border-gray-200";
                        li.innerHTML = `
                            <span class="text-sm text-gray-700 font-mono"><i class="fas fa-file-code text-gray-500 mr-2"></i> ${meta.name}</span>
                            <button onclick="downloadFile('${meta.path_display}', '${meta.name}')" class="text-blue-600 hover:text-blue-800 hover:underline text-sm font-medium">Scarica File</button>
                        `;
                        metaList.appendChild(li);
                    });
                }

                if (entries.length === 0) {
                    grid.innerHTML = '<div class="col-span-full text-center text-gray-500 py-12"><i class="fas fa-folder-open text-4xl mb-3 text-gray-300"></i><br>Questa cartella è vuota.</div>';
                }

            } catch (error) {
                loading.classList.add('hidden');
                grid.innerHTML = `<div class="col-span-full bg-red-50 text-red-600 rounded p-4 text-center border border-red-200"><i class="fas fa-exclamation-triangle mr-2"></i>Errore nel caricamento. Verifica la connessione o ricarica la pagina.</div>`;
                console.error(error);
            }
        }

        async function downloadFile(path, filename) {
            try {
                const response = await dbx.filesGetTemporaryLink({ path: path });
                const a = document.createElement('a');
                a.href = response.result.link;
                a.download = filename;
                a.target = '_blank';
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
            } catch (error) {
                alert("Errore durante la generazione del link di download.");
                console.error(error);
            }
        }

        function renderBreadcrumbs(path) {
            const breadcrumbs = document.getElementById('breadcrumbs');
            if (!path || path === '') {
                breadcrumbs.innerHTML = `<button class="font-bold text-blue-700 hover:underline flex items-center"><i class="fas fa-home mr-1"></i> Root (Tutte le Cartelle)</button>`;
                return;
            }

            const parts = path.split('/').filter(p => p !== '');
            let html = `<button onclick="loadFolder('')" class="hover:underline text-gray-500 flex items-center"><i class="fas fa-home mr-1"></i> Root</button>`;
            
            let currentBuildPath = '';
            parts.forEach((part, index) => {
                currentBuildPath += '/' + part;
                html += ` <i class="fas fa-chevron-right text-xs text-gray-400 mx-2"></i> `;
                if (index === parts.length - 1) {
                    html += `<span class="font-bold text-blue-700">${part}</span>`;
                } else {
                    html += `<button onclick="loadFolder('${currentBuildPath}')" class="hover:underline text-gray-600">${part}</button>`;
                }
            });
            breadcrumbs.innerHTML = html;
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Operatore - Archivio Foto</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dropbox.js/10.33.0/Dropbox-sdk.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-100 text-gray-800 font-sans">

    <div id="login-screen" class="fixed inset-0 bg-gray-900 flex items-center justify-center z-50 hidden">
        <div class="bg-white p-8 rounded-lg shadow-xl max-w-sm w-full text-center">
            <i class="fab fa-dropbox text-6xl text-blue-500 mb-4"></i>
            <h2 class="text-2xl font-bold text-gray-800 mb-2">Accesso Operatore</h2>
            <p class="text-sm text-gray-500 mb-6">Connetti il tuo account Dropbox per visualizzare le cartelle dell'App.</p>
            
            <button onclick="avviaLoginDropbox()" class="w-full bg-blue-600 text-white font-bold p-3 rounded hover:bg-blue-700 transition duration-200 shadow">
                <i class="fab fa-dropbox mr-2"></i> Accedi con Dropbox
            </button>
        </div>
    </div>

    <div id="app-container" class="hidden">
        <header class="bg-blue-600 text-white p-4 shadow-md">
            <div class="container mx-auto flex justify-between items-center">
                <h1 class="text-2xl font-bold"><i class="fas fa-camera-retro mr-2"></i> Dashboard Foto</h1>
                <div class="flex items-center space-x-4">
                    <span id="status" class="text-sm bg-blue-800 px-3 py-1 rounded-full"><i class="fas fa-sync fa-spin"></i> Connessione...</span>
                    <button onclick="logout()" class="text-sm hover:underline text-blue-200"><i class="fas fa-sign-out-alt"></i> Disconnetti</button>
                </div>
            </div>
        </header>

        <main class="container mx-auto mt-8 p-4 bg-white rounded-lg shadow min-h-[60vh]">
            <div class="flex items-center space-x-2 text-blue-600 mb-6 pb-4 border-b border-gray-200" id="breadcrumbs"></div>

            <div id="loading" class="text-center py-10 hidden">
                <i class="fas fa-spinner fa-spin text-4xl text-blue-500"></i>
                <p class="mt-2 text-gray-500">Caricamento in corso...</p>
            </div>

            <div id="content-grid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6"></div>
        </main>
    </div>

    <script>
        // ==========================================
        // CONFIGURAZIONE DROPBOX OAUTH
        // ==========================================
        const DROPBOX_APP_KEY = "0kimqzc29he9w1u"; 
        
        // Deve essere l'URL ESATTO in cui è ospitata la pagina (es. su GitHub Pages)
        const REDIRECT_URI = "https://evotechlab.github.io/fieldcamdash/"; 
        
        // Lascia vuoto ("") per la radice dell'App Folder, oppure specifica la cartella (es. "/Foto")
        const BASE_FOLDER = ""; 

        let accessToken = localStorage.getItem("db_access");
        let dbx;

        // Inizializzazione al caricamento della pagina
        document.addEventListener('DOMContentLoaded', () => {
            // 1. Controlliamo se stiamo tornando da Dropbox con il token nell'URL (URL Fragment)
            if (window.location.hash.includes('access_token')) {
                const hashParams = new URLSearchParams(window.location.hash.substring(1));
                const token = hashParams.get('access_token');
                
                if (token) {
                    // Salviamo il token
                    localStorage.setItem("db_access", token);
                    accessToken = token;
                    // Ripuliamo l'URL per estetica e sicurezza
                    window.history.replaceState(null, null, window.location.pathname);
                }
            }

            // 2. Se abbiamo il token, apriamo la dashboard, altrimenti schermata di login
            if (accessToken) {
                inizializzaDashboard();
            } else {
                document.getElementById('login-screen').classList.remove('hidden');
            }
        });

        // Genera il link di autorizzazione e reindirizza l'utente a Dropbox
        function avviaLoginDropbox() {
            // Usiamo il flusso "Implicit Grant" (response_type=token) ideale per le app client-side
            const authUrl = `https://www.dropbox.com/oauth2/authorize?client_id=${DROPBOX_APP_KEY}&response_type=token&redirect_uri=${encodeURIComponent(REDIRECT_URI)}`;
            window.location.href = authUrl;
        }

        function logout() {
            localStorage.removeItem("db_access");
            window.location.reload();
        }

        async function inizializzaDashboard() {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('app-container').classList.remove('hidden');
            
            dbx = new Dropbox.Dropbox({ accessToken: accessToken });
            
            try {
                // Verifichiamo se il token è ancora valido
                await dbx.usersGetCurrentAccount();
                document.getElementById('status').innerHTML = '<i class="fas fa-check-circle text-green-400"></i> Connesso';
                loadFolder(BASE_FOLDER);
            } catch (error) {
                // Se c'è un errore 401, il token salvato è scaduto o revocato
                if (error.status === 401) {
                    alert("La sessione è scaduta. Effettua nuovamente l'accesso.");
                    logout();
                } else {
                    document.getElementById('status').innerHTML = '<i class="fas fa-exclamation-triangle text-red-400"></i> Errore di connessione';
                    console.error(error);
                }
            }
        }

        // --- FUNZIONI DI LETTURA DROPBOX ---
        async function loadFolder(path) {
            const grid = document.getElementById('content-grid');
            const loading = document.getElementById('loading');
            
            grid.innerHTML = '';
            loading.classList.remove('hidden');
            renderBreadcrumbs(path);

            try {
                const response = await dbx.filesListFolder({ path: path });
                const entries = response.result.entries;

                const folders = entries.filter(e => e['.tag'] === 'folder');
                const photos = entries.filter(e => e['.tag'] === 'file'); // Filtra estensioni se necessario

                loading.classList.add('hidden');

                folders.forEach(folder => {
                    const card = document.createElement('div');
                    card.className = "bg-gray-50 hover:bg-blue-50 border border-gray-200 rounded-lg p-4 cursor-pointer flex items-center shadow-sm";
                    card.onclick = () => loadFolder(folder.path_display);
                    card.innerHTML = `<i class="fas fa-folder text-yellow-400 text-3xl mr-4"></i><span class="font-medium truncate">${folder.name}</span>`;
                    grid.appendChild(card);
                });

                photos.forEach(photo => {
                    const card = document.createElement('div');
                    card.className = "bg-white border border-gray-200 rounded-lg overflow-hidden shadow-sm flex flex-col";
                    card.innerHTML = `
                        <div class="bg-gray-200 h-40 flex items-center justify-center text-gray-400 border-b border-gray-100">
                            <i class="fas fa-image text-5xl"></i>
                        </div>
                        <div class="p-4 flex-1 flex flex-col justify-between">
                            <p class="text-sm font-medium text-gray-700 truncate mb-3" title="${photo.name}">${photo.name}</p>
                            <button onclick="downloadFile('${photo.path_display}', '${photo.name}')" class="w-full bg-blue-600 hover:bg-blue-700 text-white text-sm py-2 rounded shadow-sm">
                                <i class="fas fa-download mr-1"></i> Scarica
                            </button>
                        </div>
                    `;
                    grid.appendChild(card);
                });

            } catch (error) {
                loading.classList.add('hidden');
                console.error(error);
            }
        }

        async function downloadFile(path, filename) {
            try {
                const response = await dbx.filesGetTemporaryLink({ path: path });
                const a = document.createElement('a');
                a.href = response.result.link;
                a.download = filename;
                a.target = '_blank';
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
            } catch (error) {
                alert("Errore durante la generazione del link.");
                console.error(error);
            }
        }

        function renderBreadcrumbs(path) {
            const breadcrumbs = document.getElementById('breadcrumbs');
            // Se siamo alla radice (BASE_FOLDER)
            if (path === BASE_FOLDER) {
                breadcrumbs.innerHTML = `<button class="font-bold text-blue-700 hover:underline flex items-center"><i class="fas fa-home mr-1"></i> Root</button>`;
                return;
            }

            // Calcola il percorso relativo rimuovendo la BASE_FOLDER
            const relativePath = path.substring(BASE_FOLDER.length);
            const parts = relativePath.split('/').filter(p => p !== '');
            
            let html = `<button onclick="loadFolder('${BASE_FOLDER}')" class="hover:underline text-gray-500 flex items-center"><i class="fas fa-home mr-1"></i> Root</button>`;
            
            let currentBuildPath = BASE_FOLDER;
            parts.forEach((part, index) => {
                currentBuildPath += '/' + part;
                html += ` <i class="fas fa-chevron-right text-xs text-gray-400 mx-2"></i> `;
                if (index === parts.length - 1) {
                    html += `<span class="font-bold text-blue-700">${part}</span>`;
                } else {
                    html += `<button onclick="loadFolder('${currentBuildPath}')" class="hover:underline text-gray-600">${part}</button>`;
                }
            });
            breadcrumbs.innerHTML = html;
        }
    </script>
</body>
</html>
